<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Network Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        input { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Frontend Network Test</h1>
    
    <div class="test-section">
        <h2>Test Different URLs</h2>
        <button onclick="testUrl('http://localhost:5000/api/login')">Test localhost:5000</button>
        <button onclick="testUrl('http://127.0.0.1:5000/api/login')">Test 127.0.0.1:5000</button>
        <button onclick="testUrl('http://10.14.204.58:5000/api/login')">Test 10.14.204.58:5000</button>
        <div id="url-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Test Login with Different Methods</h2>
        <input type="text" id="username" value="abhinav" placeholder="Username">
        <input type="password" id="password" value="pass123" placeholder="Password">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Network Diagnostics</h2>
        <button onclick="runDiagnostics()">Run Diagnostics</button>
        <div id="diagnostics-results"></div>
    </div>

    <script>
        async function testUrl(url) {
            const resultsDiv = document.getElementById('url-results');
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: 'abhinav', password: 'pass123'}),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                resultsDiv.innerHTML += `
                    <div class="result ${response.ok ? 'success' : 'error'}">
                        <strong>${url}</strong><br>
                        Status: ${response.status}<br>
                        Success: ${response.ok}<br>
                        Response: ${JSON.stringify(data).substring(0, 200)}...
                    </div>
                `;
                
            } catch (error) {
                resultsDiv.innerHTML += `
                    <div class="result error">
                        <strong>${url}</strong><br>
                        Error: ${error.message}<br>
                        Type: ${error.name}
                    </div>
                `;
            }
        }
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultsDiv = document.getElementById('login-results');
            
            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="result ${response.ok ? 'success' : 'error'}">
                        <strong>Login Test Results</strong><br>
                        Status: ${response.status}<br>
                        Success: ${response.ok}<br>
                        Username: ${username}<br>
                        Response: ${JSON.stringify(data)}
                    </div>
                `;
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <strong>Login Failed</strong><br>
                        Error: ${error.message}<br>
                        Type: ${error.name}<br>
                        Stack: ${error.stack}
                    </div>
                `;
            }
        }
        
        async function runDiagnostics() {
            const resultsDiv = document.getElementById('diagnostics-results');
            resultsDiv.innerHTML = '<div>Running diagnostics...</div>';
            
            // Test 1: Check if server is reachable
            try {
                const response = await fetch('http://localhost:5000/', {method: 'HEAD'});
                resultsDiv.innerHTML += '<div class="result success">Server is reachable</div>';
            } catch (error) {
                resultsDiv.innerHTML += `<div class="result error">Server not reachable: ${error.message}</div>`;
            }
            
            // Test 2: Check CORS
            try {
                const response = await fetch('http://localhost:5000/api/login', {method: 'OPTIONS'});
                resultsDiv.innerHTML += '<div class="result success">CORS preflight successful</div>';
            } catch (error) {
                resultsDiv.innerHTML += `<div class="result error">CORS preflight failed: ${error.message}</div>`;
            }
            
            // Test 3: Check browser info
            resultsDiv.innerHTML += `
                <div class="result">
                    <strong>Browser Info:</strong><br>
                    User Agent: ${navigator.userAgent}<br>
                    Origin: ${window.location.origin}<br>
                    Host: ${window.location.host}
                </div>
            `;
        }
        
        // Auto-run diagnostics on page load
        window.onload = function() {
            runDiagnostics();
        };
    </script>
</body>
</html>
