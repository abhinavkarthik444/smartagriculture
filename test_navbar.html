<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1>Navigation Bar Test</h1>
    <p>This page tests the navbar component directly:</p>
    
    <!-- Include Navigation Component Directly -->
    <div id="navbar-container"></div>
    
    <div style="margin-top: 20px; padding: 20px; background: white; border-radius: 8px;">
        <h2>Dashboard Content</h2>
        <p>If you can see the navigation bar above with all menu items, it's working correctly!</p>
    </div>

    <script>
        // Load Navigation Component
        fetch('components/navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;
                console.log('Navbar loaded successfully');
            })
            .catch(error => {
                console.error('Error loading navbar:', error);
                document.getElementById('navbar-container').innerHTML = 
                    '<div style="background: red; color: white; padding: 10px;">Error loading navbar</div>';
            });
    </script>
</body>
</html>
