<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 10px 0; }
        input { padding: 8px; margin: 5px; }
        button { padding: 10px 20px; background: #16a34a; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h2>Login Test Page</h2>
    
    <div class="form-group">
        <label>Username:</label>
        <input type="text" id="username" value="abhinav">
    </div>
    
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="pass123">
    </div>
    
    <button onclick="testLogin()">Test Login</button>
    
    <div id="result"></div>
    
    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing...';
            
            try {
                console.log('Testing login with:', {username, password});
                
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({username, password}),
                    credentials: 'include'
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h3 style="color: green;">SUCCESS!</h3>
                        <p>Status: ${response.status}</p>
                        <p>User: ${data.user.username}</p>
                        <p>Email: ${data.user.email}</p>
                        <p>Message: ${data.message}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3 style="color: red;">ERROR!</h3>
                        <p>Status: ${response.status}</p>
                        <p>Error: ${data.error}</p>
                    `;
                }
            } catch (error) {
                console.error('Login error:', error);
                resultDiv.innerHTML = `
                    <h3 style="color: red;">NETWORK ERROR!</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }
        
        // Test on page load
        window.onload = function() {
            testLogin();
        };
    </script>
</body>
</html>
