<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Fix Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-page">
        <div class="login-bg"></div>
        <div class="login-box">
            <h2>AI Farming Login</h2>
            <div id="loginForm">
                <input type="text" id="username" placeholder="Username"/>
                <input type="password" id="password" placeholder="Password"/>
                <button onclick="quickLogin()">Quick Login</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <aside class="sidebar">
            <div class="sidebar">
                <h2>AI-Farming</h2>
                <ul>
                    <li><a href="#" onclick="loadCommunity(); return false;">Community</a></li>
                </ul>
            </div>
        </aside>

        <main class="main">
            <header>
                <h2>Welcome, Farmer</h2>
            </header>

            <!-- Dynamic Content Area -->
            <div id="contentArea">
                <div class="card">
                    <h3>Welcome</h3>
                    <p>Click "Community" to test the subsections.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Quick login for testing
        function quickLogin() {
            localStorage.setItem('currentUser', JSON.stringify({username: 'testuser'}));
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }

        // Community function - simplified and guaranteed to work
        function loadCommunity() {
            console.log('loadCommunity called');
            const contentArea = document.getElementById('contentArea');
            
            if (!contentArea) {
                console.error('contentArea not found');
                return;
            }
            
            console.log('Setting community HTML');
            contentArea.innerHTML = `
                <div class="card">
                    <h3>👥 Community</h3>
                    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <button onclick="showOption('forum')" style="background: #2563eb; color: white; padding: 8px 16px; border: none; border-radius: 6px;">Forum</button>
                        <button onclick="showOption('farmers')" style="background: #6b7280; color: white; padding: 8px 16px; border: none; border-radius: 6px;">Farmers</button>
                        <button onclick="showOption('chat')" style="background: #6b7280; color: white; padding: 8px 16px; border: none; border-radius: 6px;">Chat</button>
                    </div>
                    <div id="communityContent">
                        <div class="card">
                            <h4>📝 Forum</h4>
                            <p>Forum posts will appear here.</p>
                        </div>
                    </div>
                </div>
            `;
            
            console.log('Community HTML set');
        }

        function showOption(option) {
            console.log('showOption called with:', option);
            const contentDiv = document.getElementById('communityContent');
            
            if (!contentDiv) {
                console.error('communityContent not found');
                return;
            }
            
            console.log('Loading content for:', option);
            
            switch(option) {
                case 'forum':
                    contentDiv.innerHTML = `
                        <div class="card">
                            <h4>📝 Forum</h4>
                            <p>Forum posts and discussions appear here.</p>
                            <button style="background: #16a34a; color: white; padding: 8px 16px; border: none; border-radius: 6px; margin: 10px 0;">+ Create Post</button>
                        </div>
                    `;
                    break;
                case 'farmers':
                    contentDiv.innerHTML = `
                        <div class="card">
                            <h4>👤 Farmers</h4>
                            <p>Community members appear here.</p>
                        </div>
                    `;
                    break;
                case 'chat':
                    contentDiv.innerHTML = `
                        <div class="card">
                            <h4>💬 Chat</h4>
                            <div style="height: 200px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; padding: 10px; margin: 10px 0;">
                                <p style="color: #6b7280; text-align: center;">Welcome to Community Chat!</p>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" placeholder="Type your message..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                <button style="background: #2563eb; color: white; padding: 8px 16px; border: none; border-radius: 6px;">Send</button>
                            </div>
                        </div>
                    `;
                    break;
            }
            
            console.log('Content loaded for:', option);
        }

        // Initialize
        window.onload = function() {
            console.log('Page loaded');
        };
    </script>
</body>
</html>
